<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a6a"/>
      <stop offset="50%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="summonerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#008866"/>
    </linearGradient>
    <linearGradient id="thunderGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffff00"/>
      <stop offset="100%" style="stop-color:#ffff44;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#0f0f23"/>
  
  <!-- Ground -->
  <rect x="0" y="400" width="800" height="100" fill="#1a1a2e"/>
  
  <!-- Battle Title -->
  <text x="400" y="40" text-anchor="middle" fill="#00d4aa" font-size="24" font-family="monospace" font-weight="bold">
    ⚔️ EPIC CODE BATTLE ⚔️
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="6s" repeatCount="indefinite"/>
  </text>
  
  <!-- BOSS: Legacy Monolith -->
  <g transform="translate(150, 220)">
    <!-- HP Bar -->
    <rect x="-20" y="-50" width="140" height="20" fill="#333" stroke="#fff" stroke-width="2" rx="5"/>
    <rect x="-18" y="-48" width="136" height="16" fill="#ff4444" rx="3">
      <animate attributeName="width" values="136;136;30;30" keyTimes="0;0.5;0.6;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Boss Body -->
    <rect x="0" y="0" width="100" height="140" rx="15" fill="url(#bossGrad)" stroke="#666" stroke-width="4">
      <animate attributeName="y" values="0;-5;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Boss Eyes -->
    <circle cx="35" cy="30" r="12" fill="#ff4444">
      <animate attributeName="fill" values="#ff4444;#ff6666;#ff4444" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="30" r="6" fill="#330000"/>
    <circle cx="65" cy="30" r="12" fill="#ff4444">
      <animate attributeName="fill" values="#ff4444;#ff6666;#ff4444" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="65" cy="30" r="6" fill="#330000"/>
    
    <!-- Boss Mouth -->
    <rect x="35" y="60" width="30" height="15" rx="5" fill="#222" stroke="#444" stroke-width="2"/>
    
    <!-- Damage X's -->
    <g opacity="0">
      <text x="20" y="40" fill="#ff4444" font-size="20" font-weight="bold">X</text>
      <text x="60" y="70" fill="#ff4444" font-size="20" font-weight="bold">X</text>
      <text x="30" y="100" fill="#ff4444" font-size="20" font-weight="bold">X</text>
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.55;0.6;1" dur="6s" repeatCount="indefinite"/>
    </g>
    
    <!-- Boss Label -->
    <text x="50" y="-70" text-anchor="middle" fill="#ff4444" font-size="12" font-family="monospace" font-weight="bold">
      BOSS: LEGACY MONOLITH
    </text>
  </g>
  
  <!-- THUNDER BOLT ATTACK -->
  <g transform="translate(300, 100)" opacity="0">
    <polygon points="0,0 -15,60 0,50 -10,120 5,60 0,70 10,0" fill="url(#thunderGrad)" stroke="#ffff00" stroke-width="3">
      <animateTransform attributeName="transform" type="translate" values="0,-200;0,150" dur="0.5s" begin="1s" repeatCount="indefinite"/>
    </polygon>
    <circle cx="0" cy="-10" r="15" fill="#ffff00">
      <animate attributeName="r" values="10;20;10" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="1s" begin="1s" repeatCount="indefinite"/>
  </g>
  
  <!-- SUMMONER -->
  <g transform="translate(600, 260)">
    <!-- TP Effect (stars) -->
    <g opacity="0">
      <circle cx="-30" cy="-20" r="3" fill="#00d4aa"/>
      <circle cx="30" cy="-30" r="4" fill="#00d4aa"/>
      <circle cx="-20" cy="30" r="3" fill="#00d4aa"/>
      <circle cx="35" cy="20" r="4" fill="#00d4aa"/>
      <circle cx="0" cy="-40" r="5" fill="#00d4aa"/>
      <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.25;0.4;0.5;1" dur="6s" repeatCount="indefinite"/>
    </g>
    
    <!-- Summoner Body -->
    <g>
      <!-- Position animation: dodge then attack from above -->
      <animateTransform attributeName="transform" 
        type="translate" 
        values="0,0; 150,0; 150,-150; -200,-150" 
        keyTimes="0;0.25;0.35;0.5" 
        dur="6s" 
        repeatCount="indefinite"/>
      
      <!-- Idle animation -->
      <animateTransform attributeName="transform" 
        type="translate" 
        values="0,0; 0,-3; 0,0" 
        dur="1.5s" 
        repeatCount="indefinite"
        additive="sum"/>
      
      <!-- Head -->
      <circle cx="0" cy="0" r="20" fill="url(#summonerGrad)" stroke="#00d4aa" stroke-width="3"/>
      <circle cx="-7" cy="-2" r="5" fill="#fff"/>
      <circle cx="7" cy="-2" r="5" fill="#fff"/>
      
      <!-- Body -->
      <rect x="-15" y="20" width="30" height="40" rx="5" fill="url(#summonerGrad)" stroke="#00d4aa" stroke-width="3"/>
      
      <!-- Legs -->
      <rect x="-15" y="60" width="12" height="30" rx="3" fill="#008866" stroke="#00d4aa" stroke-width="2"/>
      <rect x="3" y="60" width="12" height="30" rx="3" fill="#008866" stroke="#00d4aa" stroke-width="2"/>
    </g>
    
    <!-- Summoner Label -->
    <text x="0" y="-40" text-anchor="middle" fill="#00d4aa" font-size="12" font-family="monospace" font-weight="bold">
      <animateTransform attributeName="transform" 
        type="translate" 
        values="0,0; 150,0; 150,-150; -200,-150" 
        keyTimes="0;0.25;0.35;0.5" 
        dur="6s" 
        repeatCount="indefinite"/>
      CODE SUMMONER
    </text>
  </g>
  
  <!-- COUNTER ATTACK EFFECT -->
  <g transform="translate(200, 50)" opacity="0">
    <!-- Energy slash coming down -->
    <polygon points="-30,0 30,0 20,300 -20,300" fill="url(#summonerGrad)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" values="-30; -30" dur="1s"/>
    </polygon>
    <polygon points="-10,0 10,0 5,300 -5,300" fill="#fff" opacity="0.9"/>
    
    <!-- Stars around slash -->
    <g fill="#00d4aa">
      <circle cx="0" cy="50" r="5">
        <animate attributeName="r" values="3;6;3" dur="0.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-20" cy="100" r="4">
        <animate attributeName="r" values="2;5;2" dur="0.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="150" r="6">
        <animate attributeName="r" values="4;7;4" dur="0.35s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.5;0.6;0.7" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="200,50; 200,250" dur="0.5s" begin="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Impact effect on boss -->
  <g transform="translate(200, 290)" opacity="0">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#ff4444" stroke-width="5">
      <animate attributeName="r" values="10;80" dur="0.5s"/>
      <animate attributeName="opacity" values="1;0" dur="0.5s"/>
    </circle>
    <circle cx="0" cy="0" r="30" fill="#ff4444" opacity="0.5">
      <animate attributeName="r" values="5;60" dur="0.5s"/>
    </circle>
    <text x="0" y="-60" text-anchor="middle" fill="#ffff00" font-size="20" font-weight="bold">
      CRITICAL!
      <animate attributeName="opacity" values="0;1;0" dur="1s"/>
    </text>
    <text x="0" y="80" text-anchor="middle" fill="#ffff00" font-size="16" font-weight="bold">
      -9999 DMG
      <animate attributeName="opacity" values="0;1;0" dur="1s"/>
    </text>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.6;0.8" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- VICTORY TEXT -->
  <g transform="translate(400, 250)" opacity="0">
    <text x="0" y="0" text-anchor="middle" fill="#00d4aa" font-size="36" font-family="monospace" font-weight="bold">
      VICTORY!
    </text>
    <text x="0" y="40" text-anchor="middle" fill="#fff" font-size="14" font-family="monospace">
      "Another legacy system destroyed."
    </text>
    <text x="0" y="60" text-anchor="middle" fill="#00d4aa" font-size="12" font-family="monospace">
      — Jhon Zuluaga, Code Summoner
    </text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.7;0.8;1" dur="6s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="0.5;1" dur="0.5s" begin="4.8s" repeatCount="indefinite"/>
  </g>
</svg>
