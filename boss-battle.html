<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Boss Battle - Summoner vs Legacy Monolith</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }

        .battle-arena {
            width: 900px;
            height: 600px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #00d4aa;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 212, 170, 0.3);
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 150px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
            border-top: 2px solid #333;
        }

        /* BOSS - Legacy Monolith */
        .boss {
            position: absolute;
            left: 100px;
            bottom: 150px;
            width: 200px;
            height: 280px;
            animation: bossIdle 2s ease-in-out infinite;
        }

        .boss-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #4a4a6a 0%, #2a2a4a 50%, #1a1a3a 100%);
            border: 4px solid #666;
            border-radius: 20px;
            position: relative;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .boss-face {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 80px;
        }

        .boss-eye {
            width: 40px;
            height: 40px;
            background: #ff4444;
            border-radius: 50%;
            position: absolute;
            top: 0;
            box-shadow: 0 0 20px #ff4444;
            animation: eyeGlow 1.5s ease-in-out infinite;
        }

        .boss-eye.left { left: 10px; }
        .boss-eye.right { right: 10px; }

        .boss-mouth {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 30px;
            background: #222;
            border-radius: 0 0 40px 40px;
            border: 3px solid #444;
        }

        .boss-hp-bar {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 20px;
            background: #333;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        .boss-hp-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.5s;
        }

        .boss-label {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px #ff4444;
        }

        /* SUMMONER */
        .summoner {
            position: absolute;
            right: 150px;
            bottom: 150px;
            width: 100px;
            height: 180px;
            animation: summonerIdle 1.5s ease-in-out infinite;
        }

        .summoner-body {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .summoner-head {
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #00d4aa 0%, #008866 100%);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border: 3px solid #00d4aa;
            box-shadow: 0 0 20px #00d4aa;
        }

        .summoner-eyes {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            display: flex;
            justify-content: space-between;
        }

        .summoner-eye {
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
        }

        .summoner-torso {
            width: 60px;
            height: 70px;
            background: linear-gradient(180deg, #00d4aa 0%, #008866 100%);
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 10px;
            border: 3px solid #00d4aa;
        }

        .summoner-legs {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            display: flex;
            justify-content: space-between;
        }

        .summoner-leg {
            width: 25px;
            height: 60px;
            background: linear-gradient(180deg, #008866 0%, #006644 100%);
            border-radius: 0 0 10px 10px;
            border: 2px solid #00d4aa;
        }

        .summoner-label {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            color: #00d4aa;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px #00d4aa;
        }

        /* ATTACK EFFECTS */
        .thunder-bolt {
            position: absolute;
            width: 10px;
            height: 200px;
            background: linear-gradient(180deg, #ffff00, #ffff44, transparent);
            left: 300px;
            top: 50px;
            opacity: 0;
            transform: rotate(15deg);
            filter: blur(2px);
        }

        .thunder-bolt::before {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: #ffff00;
            border-radius: 50%;
            top: -10px;
            left: -10px;
            box-shadow: 0 0 30px #ffff00;
        }

        .dodge-effect {
            position: absolute;
            right: 150px;
            bottom: 200px;
            width: 100px;
            height: 100px;
            border: 3px dashed #00d4aa;
            border-radius: 50%;
            opacity: 0;
        }

        .counter-attack {
            position: absolute;
            right: 200px;
            top: 50px;
            width: 80px;
            height: 300px;
            opacity: 0;
        }

        .energy-slash {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, 
                transparent 0%, 
                #00d4aa 20%, 
                #ffffff 50%, 
                #00d4aa 80%, 
                transparent 100%);
            filter: blur(5px);
            transform: rotate(-30deg);
        }

        /* PARTICLES */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #00d4aa;
            border-radius: 50%;
            opacity: 0;
        }

        /* IMPACT EFFECT */
        .impact {
            position: absolute;
            left: 150px;
            bottom: 200px;
            width: 150px;
            height: 150px;
            opacity: 0;
        }

        .impact-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 5px solid #ff4444;
            border-radius: 50%;
            animation: impactRing 0.5s ease-out;
        }

        /* ANIMATIONS */
        @keyframes bossIdle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes summonerIdle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes eyeGlow {
            0%, 100% { box-shadow: 0 0 20px #ff4444; }
            50% { box-shadow: 0 0 40px #ff4444, 0 0 60px #ff4444; }
        }

        @keyframes thunderStrike {
            0% { opacity: 0; top: -200px; }
            10% { opacity: 1; }
            30% { top: 100px; }
            40% { opacity: 0; }
            100% { opacity: 0; }
        }

        @keyframes dodge {
            0% { transform: translateX(0) scale(1); opacity: 1; }
            50% { transform: translateX(100px) scale(0.8); opacity: 0.5; }
            100% { transform: translateX(200px) scale(1); opacity: 0; }
        }

        @keyframes counterStrike {
            0% { opacity: 0; transform: translateY(-100px) rotate(-30deg); }
            50% { opacity: 1; transform: translateY(200px) rotate(-30deg); }
            100% { opacity: 0; transform: translateY(300px) rotate(-30deg); }
        }

        @keyframes impactRing {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @keyframes victory {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* SEQUENCE CLASSES */
        .sequence-attack .thunder-bolt {
            animation: thunderStrike 1s ease-in;
        }

        .sequence-dodge .summoner {
            animation: dodge 0.8s ease-out forwards;
        }

        .sequence-dodge .dodge-effect {
            animation: dodge 0.8s ease-out forwards;
            opacity: 1;
        }

        .sequence-counter .counter-attack {
            animation: counterStrike 1s ease-in forwards;
        }

        .sequence-impact .boss {
            animation: shake 0.5s ease-in-out;
        }

        .sequence-victory .summoner {
            animation: victory 1s ease-in-out infinite;
        }

        /* TEXT DISPLAY */
        .battle-text {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 20px #00d4aa;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .battle-text.active {
            opacity: 1;
        }

        /* VICTORY TEXT */
        .victory-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 1s;
        }

        .victory-text h1 {
            color: #00d4aa;
            font-size: 48px;
            text-shadow: 0 0 30px #00d4aa;
            margin-bottom: 20px;
        }

        .victory-text p {
            color: #fff;
            font-size: 18px;
        }

        .victory-text.show {
            opacity: 1;
        }

        /* RESTART BUTTON */
        .restart-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: linear-gradient(90deg, #00d4aa, #008866);
            border: none;
            border-radius: 30px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.5s, transform 0.3s;
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.5);
        }

        .restart-btn:hover {
            transform: translateX(-50%) scale(1.1);
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.8);
        }

        .restart-btn.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="battle-arena" id="arena">
        <div class="ground"></div>
        
        <!-- BOSS -->
        <div class="boss" id="boss">
            <div class="boss-label">BOSS: LEGACY MONOLITH</div>
            <div class="boss-hp-bar">
                <div class="boss-hp-fill" id="bossHp"></div>
            </div>
            <div class="boss-body">
                <div class="boss-face">
                    <div class="boss-eye left"></div>
                    <div class="boss-eye right"></div>
                    <div class="boss-mouth"></div>
                </div>
            </div>
        </div>

        <!-- SUMMONER -->
        <div class="summoner" id="summoner">
            <div class="summoner-label">CODE SUMMONER</div>
            <div class="summoner-body">
                <div class="summoner-head">
                    <div class="summoner-eyes">
                        <div class="summoner-eye"></div>
                        <div class="summoner-eye"></div>
                    </div>
                </div>
                <div class="summoner-torso"></div>
                <div class="summoner-legs">
                    <div class="summoner-leg"></div>
                    <div class="summoner-leg"></div>
                </div>
            </div>
        </div>

        <!-- EFFECTS -->
        <div class="thunder-bolt" id="thunder"></div>
        <div class="dodge-effect" id="dodgeEffect"></div>
        <div class="counter-attack" id="counter">
            <div class="energy-slash"></div>
        </div>
        <div class="impact" id="impact">
            <div class="impact-ring"></div>
        </div>

        <!-- TEXT -->
        <div class="battle-text" id="battleText"></div>
        <div class="victory-text" id="victoryText">
            <h1>VICTORY!</h1>
            <p>"Another legacy system destroyed."</p>
            <p style="margin-top: 10px; color: #00d4aa;">— Jhon Zuluaga, Code Summoner</p>
        </div>

        <!-- RESTART BUTTON -->
        <button class="restart-btn" id="restartBtn" onclick="startBattle()">WATCH AGAIN</button>
    </div>

    <script>
        const arena = document.getElementById('arena');
        const boss = document.getElementById('boss');
        const summoner = document.getElementById('summoner');
        const thunder = document.getElementById('thunder');
        const dodgeEffect = document.getElementById('dodgeEffect');
        const counter = document.getElementById('counter');
        const impact = document.getElementById('impact');
        const battleText = document.getElementById('battleText');
        const bossHp = document.getElementById('bossHp');
        const victoryText = document.getElementById('victoryText');
        const restartBtn = document.getElementById('restartBtn');

        function showText(text) {
            battleText.textContent = text;
            battleText.classList.add('active');
        }

        function hideText() {
            battleText.classList.remove('active');
        }

        function resetBattle() {
            arena.className = 'battle-arena';
            bossHp.style.width = '100%';
            victoryText.classList.remove('show');
            restartBtn.classList.remove('show');
            hideText();
            summoner.style.opacity = '1';
            summoner.style.transform = 'none';
        }

        async function startBattle() {
            resetBattle();

            // FRAME 1: BOSS AWAKES
            await new Promise(r => setTimeout(r, 500));
            showText('⚔️ EPIC CODE BATTLE ⚔️');
            await new Promise(r => setTimeout(r, 2000));

            // FRAME 2: THUNDER STRIKE
            hideText();
            await new Promise(r => setTimeout(r, 300));
            showText('BOSS USES: THUNDER STRIKE!');
            arena.classList.add('sequence-attack');
            await new Promise(r => setTimeout(r, 1000));
            arena.classList.remove('sequence-attack');

            // FRAME 3: DODGE
            hideText();
            await new Promise(r => setTimeout(r, 300));
            showText('SUMMONER DODGES! TELEPORT!');
            arena.classList.add('sequence-dodge');
            await new Promise(r => setTimeout(r, 800));
            
            // Move summoner to attack position
            summoner.style.transition = 'none';
            summoner.style.opacity = '0';
            arena.classList.remove('sequence-dodge');
            
            // Position for counter-attack (above boss)
            summoner.style.position = 'absolute';
            summoner.style.right = '400px';
            summoner.style.top = '50px';
            summoner.style.bottom = 'auto';
            await new Promise(r => setTimeout(r, 100));
            summoner.style.transition = 'opacity 0.3s';
            summoner.style.opacity = '1';

            // FRAME 4: COUNTER ATTACK
            hideText();
            await new Promise(r => setTimeout(r, 300));
            showText('COUNTER ATTACK FROM ABOVE!');
            arena.classList.add('sequence-counter');
            await new Promise(r => setTimeout(r, 500));

            // IMPACT
            hideText();
            arena.classList.remove('sequence-counter');
            arena.classList.add('sequence-impact');
            bossHp.style.width = '20%';
            showText('CRITICAL HIT! DAMAGE: 9999');
            await new Promise(r => setTimeout(r, 1000));

            // VICTORY
            hideText();
            arena.classList.remove('sequence-impact');
            arena.classList.add('sequence-victory');
            victoryText.classList.add('show');
            restartBtn.classList.add('show');

            // Reset summoner position for next time
            setTimeout(() => {
                summoner.style.transition = 'none';
                summoner.style.right = '150px';
                summoner.style.top = 'auto';
                summoner.style.bottom = '150px';
            }, 2000);
        }

        // Start battle on load
        window.addEventListener('load', startBattle);
    </script>
</body>
</html>
