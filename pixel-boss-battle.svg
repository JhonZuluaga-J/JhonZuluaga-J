<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Pixel Art Battle Arena -->
  
  <!-- Background -->
  <rect width="640" height="360" fill="#1a1a2e"/>
  
  <!-- Ground pixels -->
  <g fill="#2d2d44">
    <rect x="0" y="320" width="640" height="40"/>
    <!-- Pixel grass details -->
    <rect x="20" y="315" width="8" height="5" fill="#3d3d54"/>
    <rect x="60" y="315" width="8" height="5" fill="#3d3d54"/>
    <rect x="200" y="315" width="8" height="5" fill="#3d3d54"/>
    <rect x="400" y="315" width="8" height="5" fill="#3d3d54"/>
    <rect x="560" y="315" width="8" height="5" fill="#3d3d54"/>
  </g>
  
  <!-- BOSS: Legacy Monolith (Pixel Style) -->
  <g transform="translate(80, 180)">
    <!-- HP Bar -->
    <rect x="-10" y="-30" width="120" height="16" fill="#000" stroke="#fff" stroke-width="2"/>
    <rect x="-6" y="-26" width="112" height="8" fill="#ff3333">
      <animate attributeName="width" values="112;112;25;25" keyTimes="0;0.5;0.6;1" dur="8s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Boss Body - 8-bit style -->
    <rect x="0" y="0" width="80" height="120" fill="#4a4a6a" stroke="#222" stroke-width="2"/>
    
    <!-- Boss detail pixels -->
    <rect x="8" y="8" width="64" height="8" fill="#5a5a7a"/>
    <rect x="8" y="104" width="64" height="8" fill="#3a3a5a"/>
    
    <!-- Left Eye -->
    <rect x="16" y="32" width="16" height="16" fill="#ff0000">
      <animate attributeName="fill" values="#ff0000;#ff6666;#ff0000" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="20" y="36" width="8" height="8" fill="#330000"/>
    
    <!-- Right Eye -->
    <rect x="48" y="32" width="16" height="16" fill="#ff0000">
      <animate attributeName="fill" values="#ff0000;#ff6666;#ff0000" dur="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="52" y="36" width="8" height="8" fill="#330000"/>
    
    <!-- Mouth -->
    <rect x="28" y="64" width="24" height="8" fill="#222"/>
    
    <!-- Damage X marks (appear on hit) -->
    <g opacity="0">
      <text x="20" y="50" fill="#ffff00" font-size="16" font-family="monospace" font-weight="bold">X</text>
      <text x="50" y="80" fill="#ffff00" font-size="16" font-family="monospace" font-weight="bold">X</text>
      <rect x="30" y="90" width="20" height="4" fill="#ffff00"/>
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.6;0.65;0.8" dur="8s" repeatCount="indefinite"/>
    </g>
    
    <!-- Shake animation on hit -->
    <animateTransform attributeName="transform" type="translate" 
      values="80,180; 80,180; 75,180; 85,180; 80,180; 80,180" 
      keyTimes="0;0.6;0.62;0.64;0.66;1" 
      dur="8s" repeatCount="indefinite"/>
  </g>
  
  <!-- THUNDER ATTACK (Frame 2-3) -->
  <g opacity="0">
    <!-- Lightning bolt pixel art -->
    <polygon points="280,50 290,100 285,100 295,150 290,150 300,200 295,200 305,250" 
             fill="#ffff00" stroke="#ffffaa" stroke-width="2">
      <animateTransform attributeName="transform" type="translate" values="0,-100; 0,0" dur="0.5s"/>
    </polygon>
    <!-- Glow -->
    <circle cx="290" cy="150" r="30" fill="#ffff00" opacity="0.5">
      <animate attributeName="r" values="20;40;20" dur="0.3s"/>
    </circle>
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.5;1" dur="1.5s" begin="1s" repeatCount="indefinite"/>
  </g>
  
  <!-- SUMMONER (Pixel Art) -->
  <g>
    <!-- Teleport/Dodge animation -->
    <animateTransform attributeName="transform" 
      type="translate" 
      values="480,220; 480,220; 550,220; 550,220; 350,80; 350,80; 480,220" 
      keyTimes="0;0.25;0.35;0.4;0.5;0.7;1" 
      dur="8s" repeatCount="indefinite"/>
    
    <!-- Summoner Body -->
    <!-- Head -->
    <rect x="0" y="0" width="32" height="32" fill="#00d4aa" stroke="#008866" stroke-width="2"/>
    <rect x="4" y="4" width="8" height="8" fill="#fff"/> <!-- Left eye -->
    <rect x="20" y="4" width="8" height="8" fill="#fff"/> <!-- Right eye -->
    <rect x="6" y="6" width="4" height="4" fill="#000"/>
    <rect x="22" y="6" width="4" height="4" fill="#000"/>
    
    <!-- Body/Robe -->
    <rect x="0" y="32" width="32" height="48" fill="#00d4aa" stroke="#008866" stroke-width="2"/>
    <rect x="8" y="40" width="16" height="4" fill="#008866"/> <!-- Belt -->
    
    <!-- Staff -->
    <rect x="-8" y="-16" width="6" height="80" fill="#8b4513" stroke="#5c2e0e" stroke-width="1"/>
    <rect x="-10" y="-24" width="10" height="12" fill="#00d4aa" stroke="#fff" stroke-width="1">
      <animate attributeName="fill" values="#00d4aa;#ffffff;#00d4aa" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Teleport stars -->
    <g opacity="0">
      <rect x="40" y="10" width="4" height="4" fill="#00d4aa"/>
      <rect x="-20" y="20" width="4" height="4" fill="#00d4aa"/>
      <rect x="35" y="50" width="4" height="4" fill="#00d4aa"/>
      <rect x="-15" y="-10" width="4" height="4" fill="#00d4aa"/>
      <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.3;0.4;0.5;1" dur="8s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- SLASH ATTACK (Counter from above) -->
  <g opacity="0">
    <!-- Energy slash -->
    <polygon points="200,50 220,50 240,200 200,200" fill="#00d4aa" opacity="0.8">
      <animateTransform attributeName="transform" type="translate" values="0,-150; 0,50" dur="0.5s"/>
    </polygon>
    <polygon points="210,50 215,50 225,200 210,200" fill="#ffffff" opacity="0.9">
      <animateTransform attributeName="transform" type="translate" values="0,-150; 0,50" dur="0.5s"/>
    </polygon>
    
    <!-- Impact pixels -->
    <g>
      <rect x="180" y="240" width="8" height="8" fill="#ffff00"/>
      <rect x="220" y="250" width="8" height="8" fill="#ffff00"/>
      <rect x="200" y="260" width="8" height="8" fill="#ffff00"/>
      <rect x="160" y="230" width="8" height="8" fill="#00d4aa"/>
      <rect x="240" y="240" width="8" height="8" fill="#00d4aa"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20" dur="0.5s"/>
      <animate attributeName="opacity" values="1;0" dur="0.5s"/>
    </g>
    
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.45;0.55;0.7" dur="8s" repeatCount="indefinite"/>
  </g>
  
  <!-- IMPACT EFFECT -->
  <g transform="translate(120, 240)" opacity="0">
    <!-- Pixel explosion -->
    <rect x="0" y="0" width="80" height="80" fill="#ffff00" opacity="0.6">
      <animate attributeName="width" values="0;80;120" dur="0.5s"/>
      <animate attributeName="height" values="0;80;120" dur="0.5s"/>
      <animate attributeName="x" values="40;0;-20" dur="0.5s"/>
      <animate attributeName="y" values="40;0;-20" dur="0.5s"/>
    </rect>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.55;0.6;0.75" dur="8s" repeatCount="indefinite"/>
  </g>
  
  <!-- DAMAGE NUMBERS -->
  <g transform="translate(120, 160)" opacity="0">
    <text x="0" y="0" fill="#ffff00" font-size="20" font-family="monospace" font-weight="bold" text-anchor="middle">
      -9999
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30" dur="1s"/>
    </text>
    <text x="0" y="20" fill="#ff0000" font-size="14" font-family="monospace" font-weight="bold" text-anchor="middle">
      CRITICAL!
    </text>
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.6;0.7;0.9" dur="8s" repeatCount="indefinite"/>
  </g>
  
  <!-- VICTORY SCREEN -->
  <g opacity="0">
    <rect x="220" y="140" width="200" height="80" fill="#000" stroke="#00d4aa" stroke-width="4" rx="4"/>
    <text x="320" y="170" fill="#00d4aa" font-size="24" font-family="monospace" font-weight="bold" text-anchor="middle">
      VICTORY!
    </text>
    <text x="320" y="190" fill="#fff" font-size="10" font-family="monospace" text-anchor="middle">
      "Another legacy system"
    </text>
    <text x="320" y="205" fill="#fff" font-size="10" font-family="monospace" text-anchor="middle">
      "destroyed."
    </text>
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.7;0.8;1" dur="8s" repeatCount="indefinite"/>
  </g>
  
  <!-- Battle Title Pixel -->
  <text x="320" y="30" fill="#00d4aa" font-size="16" font-family="monospace" font-weight="bold" text-anchor="middle">
    ⚔️ EPIC BOSS BATTLE ⚔️
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.7;1" dur="8s" repeatCount="indefinite"/>
  </text>
  
  <!-- Labels -->
  <text x="120" y="170" fill="#ff3333" font-size="10" font-family="monospace" font-weight="bold" text-anchor="middle">
    LEGACY MONOLITH
    <animateTransform attributeName="transform" type="translate" values="0,0; -5,0; 5,0; 0,0" keyTimes="0;0.6;0.65;1" dur="8s" repeatCount="indefinite"/>
  </text>
  
  <text x="500" y="210" fill="#00d4aa" font-size="10" font-family="monospace" font-weight="bold" text-anchor="middle">
    CODE SUMMONER
  </text>
</svg>
