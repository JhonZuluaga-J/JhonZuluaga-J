<svg viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background - Arcade style -->
  <rect width="600" height="200" fill="#000"/>
  
  <!-- Maze walls -->
  <g fill="#2121de">
    <!-- Top wall -->
    <rect x="0" y="0" width="600" height="10"/>
    <!-- Bottom wall -->
    <rect x="0" y="190" width="600" height="10"/>
    <!-- Top blocks -->
    <rect x="100" y="30" width="60" height="20"/>
    <rect x="250" y="30" width="100" height="20"/>
    <rect x="440" y="30" width="60" height="20"/>
    <!-- Middle blocks -->
    <rect x="50" y="90" width="80" height="20"/>
    <rect x="200" y="90" width="200" height="20"/>
    <rect x="470" y="90" width="80" height="20"/>
    <!-- Bottom blocks -->
    <rect x="100" y="150" width="60" height="20"/>
    <rect x="250" y="150" width="100" height="20"/>
    <rect x="440" y="150" width="60" height="20"/>
  </g>
  
  <!-- Dots to eat -->
  <g fill="#ffb897">
    <circle cx="30" cy="100" r="3"/>
    <circle cx="60" cy="100" r="3"/>
    <circle cx="150" cy="40" r="3"/>
    <circle cx="150" cy="100" r="3"/>
    <circle cx="150" cy="160" r="3"/>
    <circle cx="400" cy="40" r="3"/>
    <circle cx="400" cy="100" r="3"/>
    <circle cx="400" cy="160" r="3"/>
    <circle cx="530" cy="100" r="3"/>
    <circle cx="570" cy="100" r="3"/>
  </g>
  
  <!-- Power pellets (big dots) -->
  <g fill="#ffb897">
    <circle cx="20" cy="100" r="6">
      <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="580" cy="100" r="6">
      <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- PACMAN -->
  <g>
    <circle cx="50" cy="100" r="15" fill="#ffff00">
      <!-- Mouth animation -->
      <animate attributeName="r" values="15;14;15" dur="0.2s" repeatCount="indefinite"/>
    </circle>
    <!-- Mouth cutout using a triangle -->
    <polygon points="50,100 70,85 70,115" fill="#000">
      <animate attributeName="points" values="50,100 70,90 70,110; 50,100 70,85 70,115; 50,100 70,90 70,110" dur="0.3s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- Movement animation - chasing ghosts -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 200,0; 200,0; 400,0; 400,0; 520,0; 520,0; 0,0" keyTimes="0;0.2;0.25;0.4;0.45;0.6;0.8;1" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- GHOST 1: BLINKY (Red) -->
  <g transform="translate(200, 100)">
    <!-- Body -->
    <path d="M-15,0 L-15,-15 Q-15,-25 0,-25 Q15,-25 15,-15 L15,0 L10,-5 L5,0 L0,-5 L-5,0 L-10,-5 Z" fill="#ff0000"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-12" r="4" fill="#fff"/>
    <circle cx="5" cy="-12" r="4" fill="#fff"/>
    <circle cx="-5" cy="-12" r="2" fill="#00f"/>
    <circle cx="5" cy="-12" r="2" fill="#00f"/>
    
    <!-- Scared animation when pacman approaches -->
    <animateTransform attributeName="transform" type="translate" values="200,100; 200,100; 200,100; 250,60; 250,60; 450,60; 450,140; 200,100" keyTimes="0;0.2;0.35;0.4;0.5;0.65;0.75;1" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- GHOST 2: PINKY (Pink) -->
  <g transform="translate(300, 60)">
    <path d="M-15,0 L-15,-15 Q-15,-25 0,-25 Q15,-25 15,-15 L15,0 L10,-5 L5,0 L0,-5 L-5,0 L-10,-5 Z" fill="#ffb8ff"/>
    <circle cx="-5" cy="-12" r="4" fill="#fff"/>
    <circle cx="5" cy="-12" r="4" fill="#fff"/>
    <circle cx="-5" cy="-12" r="2" fill="#00f"/>
    <circle cx="5" cy="-12" r="2" fill="#00f"/>
    
    <animateTransform attributeName="transform" type="translate" values="300,60; 300,60; 300,60; 320,60; 320,60; 320,140; 320,140; 300,60" keyTimes="0;0.25;0.35;0.4;0.5;0.6;0.8;1" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- GHOST 3: INKY (Cyan) -->
  <g transform="translate(350, 140)">
    <path d="M-15,0 L-15,-15 Q-15,-25 0,-25 Q15,-25 15,-15 L15,0 L10,-5 L5,0 L0,-5 L-5,0 L-10,-5 Z" fill="#00ffff"/>
    <circle cx="-5" cy="-12" r="4" fill="#fff"/>
    <circle cx="5" cy="-12" r="4" fill="#fff"/>
    <circle cx="-5" cy="-12" r="2" fill="#00f"/>
    <circle cx="5" cy="-12" r="2" fill="#00f"/>
    
    <animateTransform attributeName="transform" type="translate" values="350,140; 350,140; 350,140; 350,100; 350,100; 500,100; 500,100; 350,140" keyTimes="0;0.3;0.4;0.45;0.55;0.7;0.85;1" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- GHOST 4: CLYDE (Orange) -->
  <g transform="translate(450, 100)">
    <path d="M-15,0 L-15,-15 Q-15,-25 0,-25 Q15,-25 15,-15 L15,0 L10,-5 L5,0 L0,-5 L-5,0 L-10,-5 Z" fill="#ffb852"/>
    <circle cx="-5" cy="-12" r="4" fill="#fff"/>
    <circle cx="5" cy="-12" r="4" fill="#fff"/>
    <circle cx="-5" cy="-12" r="2" fill="#00f"/>
    <circle cx="5" cy="-12" r="2" fill="#00f"/>
    
    <animateTransform attributeName="transform" type="translate" values="450,100; 450,100; 450,100; 500,60; 500,60; 550,100; 550,100; 450,100" keyTimes="0;0.2;0.4;0.45;0.6;0.75;0.9;1" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- Score display -->
  <text x="20" y="25" fill="#fff" font-family="monospace" font-size="14">1UP</text>
  <text x="20" y="42" fill="#ffff00" font-family="monospace" font-size="16">00</text>
  <text x="80" y="25" fill="#fff" font-family="monospace" font-size="14">HIGH SCORE</text>
  <text x="80" y="42" fill="#ffff00" font-family="monospace" font-size="16">10420</text>
  
  <!-- Lives (small pacmans) -->
  <g transform="translate(20, 175)">
    <circle cx="0" cy="0" r="8" fill="#ffff00"/>
    <polygon points="0,0 12,-6 12,6" fill="#000"/>
    <circle cx="20" cy="0" r="8" fill="#ffff00"/>
    <polygon points="20,0 32,-6 32,6" fill="#000"/>
  </g>
  
  <!-- Game title -->
  <text x="300" y="185" fill="#ffff00" font-family="monospace" font-size="12" text-anchor="middle" font-weight="bold">
    COMMIT CHASER
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </text>
  
  <!-- Cherry powerup -->
  <g transform="translate(550, 175)">
    <circle cx="0" cy="0" r="8" fill="#ff0000"/>
    <circle cx="12" cy="0" r="8" fill="#ff0000"/>
    <path d="M0,0 Q6,-10 12,0" fill="none" stroke="#00ff00" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" values="550,175; 550,173; 550,175" dur="0.5s" repeatCount="indefinite"/>
  </g>
</svg>
